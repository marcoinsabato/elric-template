services:
  app:
    container_name: elric-app
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elric-network

  db:
    image: postgres:16-alpine
    container_name: elric-db
    environment:
      POSTGRES_DB: elric_dev
      POSTGRES_USER: elric
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elric"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elric-network

  redis:
    image: redis:7-alpine
    container_name: elric-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elric-network

volumes:
  postgres_data:

networks:
  elric-network:
    driver: bridge
